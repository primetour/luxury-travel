:root { --s: 1; --accent: #b48a4a; --ink: #1a1a1a; --bg: #efece7;
          --vh100: 100vh; --vh100: 100dvh;
          --safe-top: env(safe-area-inset-top, 0px);
          --safe-bottom: env(safe-area-inset-bottom, 0px);
          --safe-left: env(safe-area-inset-left, 0px);
          --safe-right: env(safe-area-inset-right, 0px); }
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; overscroll-behavior: none; }
html { -webkit-text-size-adjust: 100%; }
body { font-family: 'Futura LT', Jost, -apple-system, sans-serif; background: var(--bg); color: var(--ink);
       min-height: 100vh; min-height: 100dvh;
       -webkit-font-smoothing: antialiased;
       -webkit-tap-highlight-color: transparent;
       padding-left: var(--safe-left); padding-right: var(--safe-right); }

header { position: sticky; top: 0; z-index: 20; background: rgba(239,236,231,.95); backdrop-filter: blur(6px);
         display: flex; align-items: center; justify-content: space-between; gap: 12px;
         padding: calc(12px + var(--safe-top)) 20px 12px;
         border-bottom: 1px solid rgba(0,0,0,.08); }
.header-right { display: flex; align-items: center; gap: 10px; }
.share-btn { background: #fff; border: 0; border-radius: 999px; box-shadow: 0 2px 14px rgba(0,0,0,.08);
             width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center;
             cursor: pointer; color: var(--ink); padding: 0; transition: transform .15s, background .2s, color .2s;
             touch-action: manipulation; }
.share-btn:hover { background: var(--ink); color: #fff; }
.share-btn:active { transform: scale(.92); }
.share-btn svg { width: 16px; height: 16px; display: block; }
.toast { position: fixed; left: 50%; bottom: calc(80px + var(--safe-bottom)); transform: translateX(-50%);
         background: rgba(26,26,26,.94); color: #fff; padding: 10px 18px; border-radius: 999px;
         font-size: 11.5px; letter-spacing: .15em; text-transform: uppercase;
         z-index: 40; opacity: 0; pointer-events: none; transition: opacity .25s; }
.toast.show { opacity: 1; }
.logo { font-family: 'Playfair Display', 'Bodoni Moda', 'Didot', serif; font-weight: 500;
         font-size: 26px; letter-spacing: .12em; line-height: 1;
         text-transform: uppercase; }
.logo small { display: block; font-family: 'Playfair Display', 'Bodoni Moda', serif;
              font-weight: 400; font-style: italic; font-size: 11px;
              letter-spacing: .15em; text-transform: none; opacity: .6; margin-top: 3px; }
.logo a { color: inherit; text-decoration: none; }
.nav-all { display: inline-flex; align-items: center; gap: 6px;
           background: #fff; border: 1px solid rgba(0,0,0,.08); border-radius: 999px;
           box-shadow: 0 2px 14px rgba(0,0,0,.08);
           color: var(--ink); text-decoration: none;
           font-family: 'Futura LT', Jost, sans-serif; font-weight: 500;
           font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase;
           padding: 9px 16px; min-height: 36px;
           transition: background .2s, color .2s, transform .15s;
           touch-action: manipulation; }
.nav-all:hover { background: var(--ink); color: #fff; }
.nav-all:active { transform: scale(.96); }
.nav-all svg { width: 14px; height: 14px; display: block; }
@media (max-width: 900px) {
  .nav-all { padding: 8px 12px; font-size: 0; letter-spacing: 0; min-width: 38px; }
  .nav-all .nav-all-label { display: none; }
  .nav-all svg { width: 16px; height: 16px; }
}
.toggle { display: inline-flex; background: #fff; border-radius: 999px; padding: 3px; box-shadow: 0 2px 14px rgba(0,0,0,.08); touch-action: manipulation; }
.toggle button { border: 0; background: transparent; padding: 10px 18px; font: inherit; font-weight: 500; font-size: 11px;
                 letter-spacing: .2em; text-transform: uppercase; color: #999; border-radius: 999px; cursor: pointer; transition: .2s;
                 touch-action: manipulation; min-height: 36px; }
.toggle button.active { background: var(--ink); color: #fff; }

main { max-width: 1400px; margin: 0 auto; padding: 14px 12px calc(78px + var(--safe-bottom));
        display: flex; justify-content: center; align-items: flex-start; }
.stage { position: relative; max-width: 100%; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none;
         display: flex; justify-content: center; }
.viewer { position: relative; background: #fff; box-shadow: 0 20px 60px rgba(0,0,0,.14), 0 4px 12px rgba(0,0,0,.06);
          border-radius: 2px; overflow: hidden; aspect-ratio: 1139.530029296875/785.197021484375;
          height: calc(100vh - 210px); height: calc(100dvh - 210px - var(--safe-top) - var(--safe-bottom));
          max-width: 100%;
          transform: translate(var(--zx, 0px), var(--zy, 0px)) scale(var(--zoom, 1));
          transform-origin: center center;
          transition: transform .18s ease;
          will-change: transform; }
.viewer.dragging { transition: none; }
.viewer .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; user-select: none; -webkit-user-drag: none; }
.viewer .bg-clean { opacity: 0; transition: opacity .3s ease; }
body.en .viewer .bg-clean { opacity: 1; }
/* PT→EN swap is done at the image level (render.py produces a fully-typeset
   en.jpg). DOM text overlays are kept hidden in both modes — they would only
   duplicate what's already baked into the image. */
.overlays { display: none; }

.t-line, .t-block, .t-rot { position: absolute; --fit: 1; }
.t-line { white-space: nowrap; line-height: 1; overflow: hidden; }
.t-line.scatter { overflow: visible; }
.t-block { overflow: hidden; }
/* The clean.jpg no longer has PT text, so EN overlays don't need any background
   color or backdrop blur — they render directly over the image. */
.t-block .ln { display: block; overflow-wrap: normal; }
.t-block.drop-cap { overflow: visible; }
.t-block.drop-cap .drop { float: left; line-height: .85; padding-right: .08em; padding-top: .04em; }
.t-block.drop-cap .body { display: block; overflow-wrap: normal; }
.t-rot { writing-mode: vertical-rl; text-orientation: mixed; white-space: nowrap; line-height: 1; transform-origin: top left; overflow: hidden; }

.loading { position: absolute; inset: 0; display: grid; place-items: center; color: #999; font-size: 12px; letter-spacing: .2em; text-transform: uppercase; }

/* Splash preload screen: covers the whole viewport until every page image has
   been fetched + decoded, so subsequent flipping is instant. */
.splash { position: fixed; inset: 0; z-index: 100;
          display: grid; place-items: center;
          background: var(--bg);
          padding: 40px 24px calc(40px + var(--safe-bottom));
          transition: opacity .45s ease; }
.splash.hidden { opacity: 0; pointer-events: none; }
.splash-inner { display: flex; flex-direction: column; align-items: center; gap: 28px;
                 max-width: 420px; width: 100%; text-align: center; }
.splash .brand { font-family: 'Playfair Display', 'Bodoni Moda', 'Didot', serif; font-weight: 500;
                   font-size: 38px; letter-spacing: .14em; line-height: 1; color: var(--ink);
                   text-transform: uppercase; }
.splash .brand small { display: block; font-family: 'Playfair Display', 'Bodoni Moda', serif;
                        font-weight: 400; font-style: italic; text-transform: none;
                        letter-spacing: .15em; font-size: 12px;
                        opacity: .55; margin-top: 10px; }
.splash .bar { width: 100%; height: 3px; background: rgba(0,0,0,.08); border-radius: 999px; overflow: hidden; }
.splash .bar > i { display: block; height: 100%; width: 0%; background: var(--accent);
                   transition: width .2s ease; }
.splash .pct { font-family: 'Futura LT', Jost, sans-serif; font-size: 10.5px; letter-spacing: .3em;
                text-transform: uppercase; color: rgba(0,0,0,.55); }
.splash .start-btn { border: 1px solid rgba(0,0,0,.2); background: transparent; color: var(--ink);
                     font: inherit; font-size: 11px; letter-spacing: .25em; text-transform: uppercase;
                     padding: 12px 22px; border-radius: 999px; cursor: pointer;
                     opacity: 0; pointer-events: none; transition: opacity .3s, background .2s, color .2s;
                     min-height: 42px; }
.splash .start-btn.ready { opacity: 1; pointer-events: auto; }
.splash .start-btn:hover { background: var(--ink); color: #fff; }
.splash .hint { font-family: 'Futura LT', Jost, sans-serif; font-size: 9.5px; letter-spacing: .25em;
                 text-transform: uppercase; color: rgba(0,0,0,.35); }

nav.bottom { position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
             display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
             padding: 12px 18px calc(12px + var(--safe-bottom));
             background: linear-gradient(to top, rgba(239,236,231,1) 68%, rgba(239,236,231,.85) 90%, rgba(239,236,231,0));
             backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
             touch-action: manipulation; pointer-events: none; }
nav.bottom > * { pointer-events: auto; }
nav.bottom .nav-side { display: inline-flex; align-items: center; gap: 6px; }
nav.bottom .nav-side.left { justify-self: start; }
nav.bottom .nav-side.right { justify-self: end; }
nav.bottom button { background: #fff; border: 1px solid rgba(0,0,0,.08); color: var(--ink);
                    font: inherit; font-size: 17px; line-height: 1; font-weight: 500;
                    min-width: 44px; min-height: 44px; padding: 0 10px; cursor: pointer;
                    opacity: 1; transition: background .18s, color .18s, transform .18s, box-shadow .18s;
                    display: inline-flex; align-items: center; justify-content: center; touch-action: manipulation;
                    border-radius: 999px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
nav.bottom button:hover:not(:disabled) { background: var(--ink); color: #fff; box-shadow: 0 4px 14px rgba(0,0,0,.14); }
nav.bottom button:active:not(:disabled) { transform: scale(.94); }
nav.bottom button:disabled { opacity: .28; cursor: not-allowed; box-shadow: none; }
nav.bottom .zoom-group { display: inline-flex; background: #fff; border: 1px solid rgba(0,0,0,.08);
                         border-radius: 999px; box-shadow: 0 2px 8px rgba(0,0,0,.06); padding: 2px;
                         margin-left: 6px; }
nav.bottom .zoom-group button { background: transparent; border: 0; box-shadow: none;
                                min-width: 38px; min-height: 38px; font-size: 16px; }
nav.bottom .zoom-group button:hover:not(:disabled) { background: var(--ink); color: #fff; }
nav.bottom .page-input { display: inline-flex; align-items: center; gap: 10px;
                         font-family: 'Futura LT', Jost, sans-serif; font-size: 11px;
                         letter-spacing: .25em; text-transform: uppercase; color: var(--ink);
                         background: #fff; border: 1px solid rgba(0,0,0,.08); border-radius: 999px;
                         padding: 6px 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
nav.bottom .page-input .pg-label { font-size: 9.5px; letter-spacing: .3em; color: rgba(0,0,0,.45); }
nav.bottom .page-input .mag-pages { color: rgba(0,0,0,.5); font-size: 10.5px; letter-spacing: .18em; }
.ai-banner { position: fixed; left: 50%; top: calc(68px + var(--safe-top)); transform: translateX(-50%); z-index: 25;
              background: rgba(26,26,26,.92); color: #fff; font-size: 11px; letter-spacing: .15em;
              text-transform: uppercase; padding: 6px 14px; border-radius: 999px;
              box-shadow: 0 4px 14px rgba(0,0,0,.15);
              max-width: calc(100vw - 24px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
              opacity: 0; pointer-events: none; transition: opacity .3s; }
body.en .ai-banner { opacity: 1; }
.ai-banner span.dot { display: inline-block; width: 6px; height: 6px; background: #b48a4a; border-radius: 999px; margin-right: 8px; vertical-align: middle; }
nav.bottom input { width: 44px; text-align: center; background: transparent; border: 0;
                   border-bottom: 1px solid rgba(0,0,0,.2); color: var(--ink);
                   padding: 2px 2px; font: inherit; font-family: 'Bodoni Moda', 'Playfair Display', serif;
                   font-weight: 500; font-size: 18px;
                   letter-spacing: .02em; min-height: 30px;
                   -webkit-appearance: none; appearance: textfield; outline: none; }
nav.bottom input:focus { border-bottom-color: var(--accent); }
nav.bottom input::-webkit-outer-spin-button, nav.bottom input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
nav.bottom .divider { display: none; }

/* Tablet */
@media (max-width: 980px) {
  main { padding: 12px 8px calc(80px + var(--safe-bottom)); }
  .viewer { height: calc(100vh - 220px); height: calc(100dvh - 220px - var(--safe-top) - var(--safe-bottom)); }
}
/* Mobile + small tablet.
   Viewer uses height-driven sizing (width: auto derived from aspect-ratio)
   so when vertical space is the binding constraint, width shrinks with it
   instead of staying at 100% and letting object-fit:cover crop the page. */
@media (max-width: 900px) {
  body { overflow: hidden; height: 100dvh; }
  header { padding: calc(10px + var(--safe-top)) 14px 10px; }
  .logo { font-size: 16px; }
  .logo small { display: none; }
  .toggle button { padding: 10px 14px; font-size: 10px; letter-spacing: .15em; min-height: 40px; }
  .header-right { gap: 8px; }
  .share-btn { width: 38px; height: 38px; }
  main { padding: 6px 4px calc(72px + var(--safe-bottom));
         height: calc(100dvh - 72px - var(--safe-top));
         align-items: center; }
  .stage { width: 100%; height: 100%; align-items: center; }
  .viewer { height: 100%; width: auto;
            max-width: 100%;
            max-height: calc(100dvh - 170px - var(--safe-top) - var(--safe-bottom)); }
  nav.bottom { padding: 10px 10px calc(10px + var(--safe-bottom));
               grid-template-columns: auto 1fr auto; gap: 8px; }
  nav.bottom button { font-size: 17px; min-width: 42px; min-height: 42px; padding: 0 8px; }
  nav.bottom .nav-side { gap: 4px; }
  /* Keep first/last buttons but show them compactly on phones */
  nav.bottom #btn-first, nav.bottom #btn-last { display: none; }
  /* Zoom pill visible on mobile, smaller */
  nav.bottom .zoom-group { margin-left: 4px; }
  nav.bottom .zoom-group button { min-width: 36px; min-height: 36px; font-size: 15px; }
  nav.bottom input { width: 42px; min-height: 30px; font-size: 16px; }
  nav.bottom .page-input { padding: 4px 12px; gap: 6px; }
  nav.bottom .page-input .pg-label { display: none; }
  .ai-banner { font-size: 9.5px; padding: 5px 10px; letter-spacing: .1em; }
}
/* Very narrow phones — tighten further so viewer isn't pushed under nav */
@media (max-width: 440px) {
  header { padding: calc(8px + var(--safe-top)) 12px 8px; }
  .logo { font-size: 14px; }
  .toggle button { padding: 8px 12px; font-size: 9.5px; min-height: 36px; }
  main { padding: 4px 4px calc(64px + var(--safe-bottom));
         height: calc(100dvh - 64px - var(--safe-top)); }
  .viewer { max-height: calc(100dvh - 120px - var(--safe-top) - var(--safe-bottom)); }
  nav.bottom { padding: 6px 8px calc(6px + var(--safe-bottom)); }
}
/* Mobile landscape — any short-height landscape device (phone rotated).
   Key trick: switch the viewer from width-driven to height-driven sizing so
   aspect-ratio is honoured without fighting a 100% width constraint that
   would collapse or overflow the page. Also lock the viewport (no scroll)
   so the sticky header doesn't steal flow height and push the viewer under
   the bottom nav. */
@media (max-height: 600px) and (orientation: landscape) {
  body { overflow: hidden; height: 100dvh; }
  header { padding: calc(4px + var(--safe-top)) 14px 4px; }
  .logo { font-size: 13px; }
  .logo small { display: none; }
  .toggle button { padding: 6px 12px; font-size: 10px; min-height: 34px; }

    );
  }
  overlaysEl.innerHTML = parts.join('');

  // EN-mode: shrink font-size on overlays that overflow their bbox
  if (lang === 'en') requestAnimationFrame(() => fitAll());
}

const FIT_MIN = 0.35;      // don't shrink smaller than 35% of original
const FIT_STEP = 0.94;     // shrink factor per iteration
const FIT_MAX_ITERS = 20;

function overflows(el) {
  return (el.scrollHeight - el.clientHeight > 0.75) || (el.scrollWidth - el.clientWidth > 0.75);
}

function fitOverlay(el) {
  if (!el.offsetParent) return;
  if (!overflows(el)) return;
  // Shrink by stepping the --fit CSS variable on the block; all inner lines
  // use calc(Npx * var(--s) * var(--fit)) so they scale together.
  let fit = 1;
  for (let i = 0; i < FIT_MAX_ITERS && fit > FIT_MIN && overflows(el); i++) {
    fit *= FIT_STEP;
    el.style.setProperty('--fit', fit.toFixed(4));
  }
}

function fitAll() {
  for (const el of overlaysEl.children) fitOverlay(el);
}

let _renderToken = 0;
function renderPage(n) {
  n = Math.max(1, Math.min(TOTAL, n));
  // Tag each render with a monotonic token so late onload handlers from a
  // superseded page don't retroactively reframe the viewer. Use a module-
  // scoped var (not a function property) because renderPage is later wrapped
  // and `renderPage._token` would resolve to the wrapper's (undefined) prop.
  const token = ++_renderToken;
  currentPage = n;
  // Don't flash the "Loading…" indicator for instant (preloaded) navigations:
  // show it only if the image is still not ready after 140ms.
  loading.textContent = lang === 'en' ? 'Loading…' : 'Carregando…';
  const loadingTimer = setTimeout(() => {
    if (token === _renderToken && !fired) loading.style.display = 'grid';
  }, 140);

  // DO NOT change aspect-ratio or object-position here — that would reframe
  // the CURRENTLY displayed (old) image and briefly reveal the wrong half.
  // applyMagFocus runs only after the new image has actually loaded, below.

  let loaded = 0;
  let fired = false;
  const onLoad = () => {
    if (token !== _renderToken) return;  // a newer renderPage has started
    if (fired) return;                        // idempotent — guard against cache+onload double
    fired = true;
    clearTimeout(loadingTimer);
    loading.style.display = 'none';
    applyMagFocus();
  };
  bgPT.onload = onLoad; bgClean.onload = onLoad;
  bgPT.onerror = onLoad; bgClean.onerror = onLoad;
  const ptSrc = pageBgSrc(n, 'pt');
  const clSrc = pageBgSrc(n, 'clean');
  // If the new src is identical (e.g. re-render of same page) OR if the cached
  // image is already complete after assignment, the browser may skip firing
  // `load`. Force the handler on the next frame so applyMagFocus always runs.
  bgPT.src = ptSrc;
  bgClean.src = clSrc;
  requestAnimationFrame(() => {
    if (token !== _renderToken) return;
    if (bgPT.complete || bgClean.complete) onLoad();
  });
  // Ultimate safety net: force-fire after 400ms regardless, so objectPosition
  // never lingers on the wrong half even if both onload and rAF miss.
  setTimeout(() => { if (token === _renderToken) onLoad(); }, 400);

  pgInput.value = n;
  btnPrev.disabled = btnFirst.disabled = (n === 1);
  btnNext.disabled = btnLast.disabled = (n === TOTAL);

  updateScale();
  renderOverlays();
  updateStatus();
  // Preload neighbors
  for (const d of [-1, 1]) {
    const m = n + d;
    if (m >= 1 && m <= TOTAL) {
      new Image().src = pageBgSrc(m, 'pt');
      new Image().src = pageBgSrc(m, 'clean');
    }
  }
}
// (_renderToken is declared at module scope; no need to initialize on function)

function updateStatus() {
  // st-right badge removed — just advance the mag-page counter.
  updateMagPages();
}

// Mobile magazine-page mode: on any mobile/small-tablet viewport we navigate
// one magazine page at a time (auto-zooming into half of each spread) instead
// of showing the full 2-page spread squeezed into a narrow screen.
// Mag mode (one magazine page at a time) applies to every phone, portrait OR
// landscape. Portrait: narrow width. Landscape: short height. Either case means
// a two-page spread would render each page too small or get clipped — so we
// switch to single-page navigation instead.
const MOBILE_MAG_Q = '(max-width: 900px), (max-height: 600px) and (orientation: landscape)';
let mobileMagMode = window.matchMedia(MOBILE_MAG_Q).matches;
try {
  window.matchMedia(MOBILE_MAG_Q).addEventListener('change', e => {
    mobileMagMode = e.matches;
    applyMagFocus();
  });
} catch (_) { /* Safari < 14 */ }
let currentMag = 1;

let magPagesIndex = null, magTotal = 0, magToPdf = null;
function computeMagPages() {
  magPagesIndex = {};
  magToPdf = {};
  let cur = 1;
  for (const pg of overlaysData) {
    const wide = pg.size[0] > 700;
    if (wide) {
      magPagesIndex[pg.page] = [cur, cur + 1];
      magToPdf[cur] = pg.page; magToPdf[cur + 1] = pg.page;
      cur += 2;
    } else {
      magPagesIndex[pg.page] = [cur];
      magToPdf[cur] = pg.page;
      cur += 1;
    }
  }
  magTotal = cur - 1;
  pgInput.max = magTotal;
}
function updateMagPages() {
  const span = document.getElementById('mag-pages');
  if (!span || !magPagesIndex) return;
  const mags = magPagesIndex[currentPage];
  if (!mags) { span.textContent = ''; pgInput.value = ''; return; }
  // Keep the input value in sync — on mobile show the active half, otherwise
  // the left page of the spread.
  pgInput.value = (mobileMagMode && mags.includes(currentMag)) ? currentMag : mags[0];
  let label;
  if (mobileMagMode && mags.length === 2) {
    label = `of ${magTotal}`;
  } else {
    label = mags.length === 2
      ? `– ${mags[1]} of ${magTotal}`
      : (currentPage === 1 ? `Cover · of ${magTotal}` : `of ${magTotal}`);
  }
  span.textContent = label;
}

function applyMagFocus() {
  if (!overlaysData || !magPagesIndex) return;
  const page = overlaysData.find(p => p.page === currentPage);
  if (!page) return;
  const [pw, ph] = page.size;
  const mags = magPagesIndex[currentPage] || [];
  if (!mags.includes(currentMag)) currentMag = mags[0];
  const isSpread = mags.length === 2;

  if (!mobileMagMode || !isSpread) {
    // Desktop or cover page: show the full PDF page.
    viewer.style.aspectRatio = `${pw}/${ph}`;
    bgPT.style.objectPosition = '50% 50%';
    bgClean.style.objectPosition = '50% 50%';
    resetZoom();
    updateMagPages();
    updateScale();
    return;
  }
  // Mobile mag mode + spread: reshape viewer to one mag-page aspect and
  // slide the full-spread image so only the active half shows. No CSS
  // transform/scale involved → nothing gets clipped top or bottom.
  viewer.style.aspectRatio = `${pw / 2}/${ph}`;
  const isLeft = mags[0] === currentMag;
  const pos = isLeft ? '0% 50%' : '100% 50%';
  bgPT.style.objectPosition = pos;
  bgClean.style.objectPosition = pos;
  resetZoom();
  updateMagPages();
  updateScale();
}

function navBy(delta) {
  if (mobileMagMode) {
    const target = Math.max(1, Math.min(magTotal, currentMag + delta));
    goToMag(target);
  } else {
    renderPage(currentPage + delta);
  }
}

function goToMag(mag) {
  const pdf = magToPdf && magToPdf[mag];
  if (!pdf) return;
  currentMag = mag;
  if (pdf !== currentPage) {
    renderPage(pdf);    // this ends in applyMagFocus via the render hook below
  } else {
    applyMagFocus();
  }
}

function updateScale() {
  if (!overlaysData) return;
  const pageData = overlaysData.find(p => p.page === currentPage);
  const refW = pageData ? pageData.size[0] : 1140;
  viewer.style.setProperty('--s', (viewer.clientWidth / refW).toFixed(5));
}

// =============== PRELOAD QUEUE + SPLASH ======================================
// Fetch + decode every page image before handing the reader to the user, so
// flipping is instant and never stalls on network/decoding. The user can tap
// "Começar a ler" after a threshold to start reading while the rest streams
// in the background.
const PRELOAD_CONCURRENCY = 8;
const EARLY_START_RATIO = 0.15;     // show "Começar a ler" after 15%
let preloadStarted = false;
let readerReady = false;            // true once the user may interact
async function preloadAllImages() {
  const urls = [];
  for (let n = 1; n <= TOTAL; n++) {
    urls.push(pageBgSrc(n, 'pt'));
    urls.push(pageBgSrc(n, 'clean'));
  }
  // Front-load pages 1..6 first so the reader opens on a visibly rendered
  // page immediately when the user starts early.
  urls.sort((a, b) => {
    const parse = s => parseInt(s.match(/p(\d+)_/)[1], 10);
    return parse(a) - parse(b);
  });
  const total = urls.length;
  let done = 0;
  const splash = document.getElementById('splash');
  const bar = document.getElementById('splash-bar');
  const pct = document.getElementById('splash-pct');
  const startBtn = document.getElementById('splash-start');
  let earlyStartArmed = false;
  const tick = () => {
    const ratio = done / total;
    const p = Math.round(ratio * 100);
    bar.style.width = p + '%';
    pct.textContent = `Preparando edição · ${p}%`;
    if (!earlyStartArmed && ratio >= EARLY_START_RATIO) {
      earlyStartArmed = true;
      startBtn.classList.add('ready');
    }
  };
  const queue = urls.slice();
  async function worker() {
    while (queue.length) {
      const url = queue.shift();
      if (!url) return;
      const img = new Image();
      img.decoding = 'async';
      img.src = url;
      try { await img.decode(); } catch (_) { /* 404 / decode error — skip */ }
      done++;
      tick();
    }
  }
  const workers = Array.from({length: PRELOAD_CONCURRENCY}, worker);
  await Promise.all(workers);
}

function hideSplash() {
  const splash = document.getElementById('splash');
  if (!splash) return;
  splash.classList.add('hidden');
  setTimeout(() => splash.remove(), 500);
  readerReady = true;
}

async function init() {
  const v = `?v=${Date.now()}`;
  const [ov, tr, bf] = await Promise.all([
    fetch('assets/overlays.json' + v, {cache:'no-store'}).then(r => r.json()),
    fetch('assets/translations.json' + v, {cache:'no-store'}).then(r => r.json()).catch(() => ({})),
    fetch('assets/block_fills.json' + v, {cache:'no-store'}).then(r => r.json()).catch(() => ({})),
  ]);
  overlaysData = ov;
  translations = tr;
  blockFills = bf;
  computeMagPages();
  // Reframe the viewer to the first page's aspect BEFORE kicking off the
  // initial image load, so the cover doesn't briefly appear stretched into
  // the wider fallback spread aspect baked into the inline style.
  currentPage = 1;
  currentMag = 1;
  applyMagFocus();
  updateScale();
  renderPage(1);
  window.addEventListener('resize', updateScale);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(updateScale);

  // Kick off the full preload, then auto-dismiss the splash when done. The
  // user can also dismiss early by clicking the "Começar a ler" button after
  // a small initial chunk has landed.
  const startBtn = document.getElementById('splash-start');
  startBtn.addEventListener('click', hideSplash);
  if (!preloadStarted) {
    preloadStarted = true;
    preloadAllImages().then(() => { if (!readerReady) hideSplash(); });
  }
}

// Share: use the native share sheet on iOS/Android and modern desktop
// browsers; otherwise copy the link to the clipboard and show a toast.
function showToast(msg, ms) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), ms || 1800);
}
async function shareFlipbook() {
  const cleanURL = location.origin + location.pathname;
  const title = document.title;
  const text = 'Luxury Travel by PRIMETOUR | Edições Digitais — ED06';
  if (navigator.share) {
    try { await navigator.share({title, text, url: cleanURL}); return; }
    catch (e) { if (e && e.name === 'AbortError') return; /* fall through to copy */ }
  }
  try {
    await navigator.clipboard.writeText(cleanURL);
    showToast('Link copiado');
  } catch (_) {
    window.prompt('Copie o link:', cleanURL);
  }
}
const shareBtn = document.getElementById('btn-share');
if (shareBtn) shareBtn.addEventListener('click', shareFlipbook);

// Wiring
btnPT.onclick = () => setLang('pt');
btnEN.onclick = () => setLang('en');
btnFirst.onclick = () => mobileMagMode ? goToMag(1) : renderPage(1);
btnPrev.onclick = () => navBy(-1);
btnNext.onclick = () => navBy(+1);
btnLast.onclick = () => mobileMagMode ? goToMag(magTotal) : renderPage(TOTAL);
pgInput.addEventListener('change', e => {
  const mag = parseInt(e.target.value, 10);
  if (!Number.isFinite(mag) || mag < 1) return;
  if (mobileMagMode) { goToMag(mag); return; }
  const pdf = magToPdf && magToPdf[mag];
  if (pdf) renderPage(pdf);
});
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') navBy(-1);
  else if (e.key === 'ArrowRight') navBy(+1);
  else if (e.key === 'Home') { mobileMagMode ? goToMag(1) : renderPage(1); }
  else if (e.key === 'End') { mobileMagMode ? goToMag(magTotal) : renderPage(TOTAL); }
  else if (e.key === 'e' || e.key === 'E') setLang('en');
  else if (e.key === 'p' || e.key === 'P') setLang('pt');
  else if (e.key === '+' || e.key === '=') zoomBy(1.25);
  else if (e.key === '-' || e.key === '_') zoomBy(1/1.25);
  else if (e.key === '0') resetZoom();
});

// ===== ZOOM + PAN + TOUCH NAVIGATION =====
const stage = document.getElementById('stage');
let zoom = 1, zx = 0, zy = 0;
const MIN_ZOOM = 1, MAX_ZOOM = 5;

function applyTransform() {
  viewer.style.setProperty('--zoom', zoom.toFixed(3));
  viewer.style.setProperty('--zx', zx.toFixed(1) + 'px');
  viewer.style.setProperty('--zy', zy.toFixed(1) + 'px');
}

function clampPan() {
  // keep the (possibly zoomed) viewer inside the stage bounds
  if (zoom <= 1) { zx = 0; zy = 0; return; }
  const vr = viewer.getBoundingClientRect();
  const sr = stage.getBoundingClientRect();
  // After scale(zoom), the bounding rect reflects that. We compute the max pan.
  const maxX = Math.max(0, (vr.width - sr.width) / 2);
  const maxY = Math.max(0, (vr.height - sr.height) / 2);
  zx = Math.max(-maxX, Math.min(maxX, zx));
  zy = Math.max(-maxY, Math.min(maxY, zy));
}

function zoomBy(factor, cx, cy) {
  const prev = zoom;
  zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom * factor));
  if (zoom === prev) return;
  // zoom toward cursor if provided
  if (cx != null && cy != null) {
    const sr = stage.getBoundingClientRect();
    const rx = cx - (sr.left + sr.width / 2);
    const ry = cy - (sr.top + sr.height / 2);
    const delta = zoom / prev;
    zx = (zx - rx) * delta + rx;
    zy = (zy - ry) * delta + ry;
  }
  clampPan();
  applyTransform();
}

function resetZoom() { zoom = 1; zx = 0; zy = 0; applyTransform(); }

$('btn-zoom-in').onclick  = () => zoomBy(1.25);
$('btn-zoom-out').onclick = () => zoomBy(1/1.25);
$('btn-zoom-reset').onclick = resetZoom;

// Ctrl+wheel zoom (desktop)
stage.addEventListener('wheel', e => {
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  zoomBy(e.deltaY < 0 ? 1.15 : 1/1.15, e.clientX, e.clientY);
}, { passive: false });

// Mouse drag to pan when zoomed
let dragging = false, dragStartX = 0, dragStartY = 0, dragZX = 0, dragZY = 0;
stage.addEventListener('mousedown', e => {
  if (zoom <= 1 || e.button !== 0) return;
  dragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragZX = zx; dragZY = zy;
  viewer.classList.add('dragging');
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  zx = dragZX + (e.clientX - dragStartX);
  zy = dragZY + (e.clientY - dragStartY);
  clampPan();
  applyTransform();
});
window.addEventListener('mouseup', () => { if (dragging) { dragging = false; viewer.classList.remove('dragging'); } });

// Touch: pinch-zoom + pan + single-finger swipe to flip pages
let touchState = null;
function touchDist(t1, t2) { const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY; return Math.hypot(dx, dy); }
function touchMid(t1, t2) { return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 }; }

stage.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    touchState = {
      mode: 'pinch',
      startDist: touchDist(e.touches[0], e.touches[1]),
      startZoom: zoom,
      startZX: zx, startZY: zy,
      mid: touchMid(e.touches[0], e.touches[1]),
    };
    e.preventDefault();
  } else if (e.touches.length === 1) {
    // In mobile magazine mode the default zoom IS >1 (half-page focus), but
    // we still want horizontal swipes to flip pages and vertical drags (none)
    // ignored. Distinguish pan from swipe by gesture direction in touchmove.
    // Mag mode now uses aspect-ratio + object-position (no CSS transform),
    // so zoom stays at 1 at baseline in every mode. Pan only kicks in when
    // the user has pinched-zoomed in past baseline.
    touchState = {
      mode: zoom > 1.01 ? 'pan' : 'swipe',
      startX: e.touches[0].clientX, startY: e.touches[0].clientY,
      startZX: zx, startZY: zy, t0: Date.now(),
      resolved: false,
    };
  }
}, { passive: false });

stage.addEventListener('touchmove', e => {
  if (!touchState) return;
  if (touchState.mode === 'pinch' && e.touches.length === 2) {
    const d = touchDist(e.touches[0], e.touches[1]);
    const factor = d / touchState.startDist;
    const newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, touchState.startZoom * factor));
    const delta = newZoom / zoom;
    zoom = newZoom;
    // anchor at midpoint
    const sr = stage.getBoundingClientRect();
    const rx = touchState.mid.x - (sr.left + sr.width / 2);
    const ry = touchState.mid.y - (sr.top + sr.height / 2);
    zx = (zx - rx) * delta + rx;
    zy = (zy - ry) * delta + ry;
    clampPan();
    applyTransform();
    e.preventDefault();
  } else if (touchState.mode === 'pan') {
    zx = touchState.startZX + (e.touches[0].clientX - touchState.startX);
    zy = touchState.startZY + (e.touches[0].clientY - touchState.startY);
    clampPan();
    applyTransform();
    e.preventDefault();
  } else if (touchState.mode === 'swipe' && e.touches.length === 1) {
    // In mobile mag mode, the swipe is the ONLY horizontal gesture — block
    // native scroll the moment we detect a clear horizontal drag, so the
    // browser doesn't start page-scrolling or rubber-banding.
    const dx = e.touches[0].clientX - touchState.startX;
    const dy = e.touches[0].clientY - touchState.startY;
    if (!touchState.resolved && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
      touchState.resolved = true;
      touchState.horizontal = Math.abs(dx) > Math.abs(dy);
    }
    if (touchState.resolved && touchState.horizontal) e.preventDefault();
  }
}, { passive: false });

stage.addEventListener('touchend', e => {
  if (!touchState) return;
  if (touchState.mode === 'swipe' && e.changedTouches.length === 1) {
    const dx = e.changedTouches[0].clientX - touchState.startX;
    const dy = e.changedTouches[0].clientY - touchState.startY;
    const dt = Date.now() - touchState.t0;
    if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.5 && dt < 600) {
      navBy(dx < 0 ? +1 : -1);
    }
  }
  touchState = null;
});

// Double-tap / double-click toggles between baseline (zoom=1) and a reading
// zoom (~2×). Works identically in mag mode and desktop — mag mode's half-
// page framing is applied via aspect-ratio, not zoom, so baseline is always 1.
let lastTap = 0;
stage.addEventListener('dblclick', e => {
  zoomBy(zoom < 1.5 ? 2 : (1/zoom), e.clientX, e.clientY);
});
stage.addEventListener('touchend', e => {
  const now = Date.now();
  if (e.changedTouches.length !== 1) { lastTap = now; return; }
  const dbl = (now - lastTap < 300);
  if (!dbl) { lastTap = now; return; }
  const t = e.changedTouches[0];
  if (zoom <= MIN_ZOOM + 0.01) zoomBy(2, t.clientX, t.clientY);
  else resetZoom();
  lastTap = now;
});

// Reset zoom + keep currentMag consistent on every PDF-page render. The
// aspect-ratio + object-position reframe (applyMagFocus) now happens inside
// renderPage's onLoad callback — deferred until the new image has actually
// loaded, so we never show the old image through a new crop window.
const _renderPage = renderPage;
renderPage = function(n) {
  resetZoom();
  const mags = magPagesIndex && magPagesIndex[n];
  if (mags && !mags.includes(currentMag)) currentMag = mags[0];
  _renderPage(n);
};

// Re-apply on viewport changes: rotation, window resize, breakpoint crossings.
window.addEventListener('resize', () => { updateScale(); applyMagFocus(); });
window.addEventListener('orientationchange', () => {
  setTimeout(() => { updateScale(); applyMagFocus(); }, 80);
});

init();
</script>
</body>
</html>
